name: secret_chat
description: "App privado para troca de mensagens cifradas (AES-256) via WhatsApp."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Ícones padrão do Material/Cupertino
  cupertino_icons: ^1.0.6

  # Criptografia AES-256 (CBC) — biblioteca consolidada no ecossistema Dart
  encrypt: ^5.0.3

  # Usada para derivar a chave de 256 bits (SHA-256) a partir da senha do usuário
  crypto: ^3.0.3

  # Abre o WhatsApp via deep link (whatsapp://send?text=...)
  url_launcher: ^6.2.5

  # Fallback: abre o menu de compartilhamento nativo caso o deep link falhe
  share_plus: ^7.2.2

  # Guarda a chave secreta localmente no aparelho (nunca é enviada a servidores)
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
